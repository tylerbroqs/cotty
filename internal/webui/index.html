<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cotty</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23101418'/%3E%3Ctext x='8' y='12' font-family='monospace' font-size='11' font-weight='bold' fill='%23ff9500' text-anchor='middle'%3EY%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="/static/xterm.css">
<style>
  html, body { height: 100%; margin: 0; background: #101418; color: #f0f6fc;
               font-family: ui-monospace, Menlo, Consolas, monospace; }
  body { display: flex; flex-direction: column; }
  header { display: flex; align-items: baseline; gap: 12px; padding: 8px 14px;
           background: #161b22; border-bottom: 1px solid #21262d; }
  header .brand { font-weight: 700; letter-spacing: 2px; }
  header .brand .accent { color: #ff9500; }
  header #status { font-size: 12px; color: #8b949e; overflow: hidden;
                   text-overflow: ellipsis; white-space: nowrap; }
  header #activity { margin-left: auto; font-size: 12px; color: #ff9500;
                     white-space: nowrap; }
  #join { max-width: 420px; margin: 12vh auto; padding: 0 16px; }
  #join h1 { font-size: 18px; }
  #join label { display: block; font-size: 12px; color: #8b949e; margin: 12px 0 4px; }
  #join input { width: 100%; box-sizing: border-box; padding: 8px; font: inherit;
                background: #0d1117; color: inherit; border: 1px solid #30363d;
                border-radius: 6px; }
  #join button { margin-top: 16px; padding: 8px 20px; font: inherit; font-weight: 600;
                 background: #ff9500; color: #101418; border: 0; border-radius: 6px;
                 cursor: pointer; }
  #term { flex: 1; min-height: 0; padding: 6px; }
  #toast { position: fixed; right: 14px; bottom: 14px; max-width: 60ch;
           padding: 8px 12px; background: #21262d; border: 1px solid #30363d;
           border-radius: 6px; font-size: 13px; opacity: 0; transition: opacity .25s; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <span class="brand">COTT<span class="accent">Y</span></span>
  <span id="status">connecting…</span>
  <span id="activity"></span>
</header>
<div id="join" hidden>
  <h1>Join a cotty session</h1>
  <label for="f-code">Session code</label>
  <input id="f-code" placeholder="XJ4K2P" autocomplete="off">
  <label for="f-name">Your name</label>
  <input id="f-name" placeholder="alice" autocomplete="off">
  <label for="f-key">Session key (only for encrypted sessions)</label>
  <input id="f-key" placeholder="from the #k= part of the invite" autocomplete="off">
  <button id="f-go">Join</button>
</div>
<div id="term" hidden></div>
<div id="toast"></div>
<script src="/static/xterm.js"></script>
<script src="/static/addon-fit.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
